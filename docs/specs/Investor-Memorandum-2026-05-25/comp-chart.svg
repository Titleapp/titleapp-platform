    <rect x="240" y="52" width="60" height="26" fill="url(#barP)" stroke-dasharray="4 3" stroke="#5039CD" stroke-width="1" fill-opacity="0.18"/>
    <text x="308" y="70" font-size="9.5" fill="#5039CD" font-style="italic">Finalized with lead · $1–2M raise</text>

