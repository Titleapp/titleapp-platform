    <line x1="290" y1="285" x2="290" y2="291" stroke="#CBD5E1"/><text x="290" y="304" text-anchor="middle">$1B</text>
    <line x1="390" y1="285" x2="390" y2="291" stroke="#CBD5E1"/><text x="390" y="304" text-anchor="middle">$3B</text>
    <line x1="490" y1="285" x2="490" y2="291" stroke="#CBD5E1"/><text x="490" y="304" text-anchor="middle">$50B</text>
    <line x1="590" y1="285" x2="590" y2="291" stroke="#CBD5E1"/><text x="590" y="304" text-anchor="middle">$150B</text>
    <line x1="680" y1="285" x2="680" y2="291" stroke="#CBD5E1"/><text x="680" y="304" text-anchor="middle">$300B</text>
    <text x="435" y="318" text-anchor="middle" font-style="italic" font-size="8.5">(log-spaced axis)</text>
